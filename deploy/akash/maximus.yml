# Maximus on Akash — 1 CPU, 2 Gi RAM, persistent brain + wallet.
# Deploy via Akash Console (console.akash.network) or: scripts/deploy-akash.sh
#
# Before deploy:
#   1. Build & push image: scripts/build-docker.sh [registry/image:tag]
#   2. Replace MAXIMUS_IMAGE below (or set MAXIMUS_IMAGE env for deploy-akash.sh)
#   3. Set secrets in Console env section OR uncomment env block below
#   4. Fund wallet with ACT (~$15 escrow for first month)
---
version: "2.0"

services:
  maximus:
    image: ghcr.io/dunk7/maximus-creative:latest
    # If GHCR package is private, set GHCR_TOKEN in .env before deploy (PAT with read:packages)
    # credentials:
    #   host: https://ghcr.io
    #   username: dunk7
    #   password: ${GHCR_TOKEN}
    expose:
      - port: 4747
        as: 80
        to:
          - global: true
    env:
      - MAXIMUS_RUNTIME_PROFILE=akash
      - BUILD_REV=dev
      - MIGRATION_SEED_URL=https://files.catbox.moe/f5fgml.gz
      - NODE_OPTIONS=--max-old-space-size=768
      - TICK_INTERVAL_MS=1800000
      - BOOT_TICK_DELAY_MS=60000
      - WAKE_PORT=4747
      # Set these in Akash Console (recommended) — do not commit real keys:
      - LLM_AUTO=true
      - LLM_API_KEY=REPLACE_ME
      - GROK_API_KEY=
      - WAKE_SECRET=create
      - FAMILY_PASSWORD=family
      - FRIEND_PASSWORD=friend
    params:
      storage:
        data:
          mount: /opt/maximus/data
          readOnly: false
        wallet:
          mount: /opt/maximus/wallet
          readOnly: false
        repo:
          mount: /opt/maximus/state
          readOnly: false

profiles:
  compute:
    maximus:
      resources:
        cpu:
          units: 1
        memory:
          size: 2Gi
        storage:
          - size: 2Gi
          - name: data
            size: 5Gi
            attributes:
              persistent: true
              class: beta3
          - name: wallet
            size: 1Gi
            attributes:
              persistent: true
              class: beta3
          - name: repo
            size: 2Gi
            attributes:
              persistent: true
              class: beta3
  placement:
    akash:
      attributes:
        host: akash
      pricing:
        maximus:
          denom: uact
          amount: 8000

deployment:
  maximus:
    akash:
      profile: maximus
      count: 1
