# Build and push Maximus Docker image to GHCR for Akash deploy.
# Trigger manually: Actions → Build Docker image → Run workflow
# Requires: repo Settings → Actions → General → Workflow permissions → Read and write

name: Build Docker image

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build-docker.yml"
      - "deploy/**"
      - "apps/**"
      - "packages/**"
      - "scripts/akash-entrypoint.sh"
      - "genesis/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/maximus-creative:latest
            ghcr.io/${{ github.repository_owner }}/maximus-creative:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/maximus-creative:${{ env.SHORT_SHA }}

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG="maximus-creative"
          USER="${{ github.repository_owner }}"
          echo "Checking package visibility..."
          VIS="$(gh api "/users/${USER}/packages/container/${PKG}" --jq .visibility 2>/dev/null || echo missing)"
          echo "Current visibility: ${VIS}"
          if [ "${VIS}" = "missing" ]; then
            echo "Package not found after push — check build logs."
            exit 1
          fi
          if [ "${VIS}" != "public" ]; then
            echo "Setting package to public..."
            gh api --method PATCH "/user/packages/container/${PKG}" -f visibility=public
            echo "Package is now public."
          else
            echo "Package already public."
          fi
          gh api "/users/${USER}/packages/container/${PKG}" --jq '{visibility,name,repository}'
