name: Maximus Wake

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Maximus wake endpoint
        env:
          MAXIMUS_WAKE_URL: ${{ secrets.MAXIMUS_WAKE_URL }}
          MAXIMUS_WAKE_SECRET: ${{ secrets.MAXIMUS_WAKE_SECRET }}
        run: |
          if [ -z "$MAXIMUS_WAKE_URL" ] || [ -z "$MAXIMUS_WAKE_SECRET" ]; then
            echo "Set MAXIMUS_WAKE_URL and MAXIMUS_WAKE_SECRET repo secrets to enable remote wake."
            exit 0
          fi
          curl -fsS -X POST "$MAXIMUS_WAKE_URL/wake" \
            -H "Authorization: Bearer $MAXIMUS_WAKE_SECRET"
